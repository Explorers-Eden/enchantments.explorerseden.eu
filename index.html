<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="NiceRon">
  <title>Explorer's Eden: Enchantments</title>
  <meta name="description" content="Explorer's Eden enchantment reference for Java Minecraft datapacks.">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="icon" href="./assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="floating-shapes">
      <span class="floating table" style="top:66.6%;left:13.0%;animation-delay:-0.9s;"></span>
      <span class="floating book" style="top:31.4%;left:33.5%;animation-delay:-4.8s;"></span>
      <span class="floating book" style="top:76.5%;left:38.0%;animation-delay:-4.0s;"></span>
      <span class="floating table" style="top:21.4%;left:14.0%;animation-delay:-2.8s;"></span>
      <span class="floating book" style="top:58.1%;left:56.7%;animation-delay:-2.15s;"></span>
      <span class="floating book" style="top:8.6%;left:72.7%;animation-delay:-1.9s;"></span>
      <span class="floating table" style="top:31.3%;left:58.5%;animation-delay:-0.65s;"></span>
      <span class="floating book" style="top:69.9%;left:81.4%;animation-delay:-0.4s;"></span>
    </div>
  </div>

  <main class="page-shell">
    <header class="hero">
      <img class="hero__title" src="./assets/images/enchantments_title.png" alt="Explorer's Eden Enchantments">
      <nav class="hero__links" aria-label="Explorer's Eden links">
        <a class="button-link" target="_blank" rel="noreferrer" href="https://explorerseden.eu"><i class="bi bi-dpad-fill"></i> Homepage</a>
        <a class="button-link" target="_blank" rel="noreferrer" href="https://wiki.explorerseden.eu"><i class="bi bi-journal-bookmark-fill"></i> Wiki</a>
        <a class="button-link" target="_blank" rel="noreferrer" href="https://discord.gg/stAF7S8mrq"><i class="bi bi-discord"></i> Discord</a>
        <a class="button-link" target="_blank" rel="noreferrer" href="https://modrinth.com/organization/explorers-eden"><i class="bi bi-gear-fill"></i> Modrinth</a>
        <a class="button-link" target="_blank" rel="noreferrer" href="https://github.com/Explorers-Eden"><i class="bi bi-github"></i> GitHub</a>
      </nav>
    </header>

    <section class="toolbar">
      <div class="search-wrap">
        <label class="sr-only" for="search-input">Search enchantments</label>
        <input type="search" id="search-input" placeholder="Search for any info on enchantments...">
        <button id="clear-search" type="button" aria-label="Clear search">×</button>
      </div>
      <p id="results-count" class="results-count" aria-live="polite"></p>
    </section>

    <section class="table-card">
      <div class="table-scroll">
        <table class="enchantments-table" id="data-table">
          <thead>
            <tr>
              <th scope="col"><button class="sort-button" type="button" data-sort="name">Name <i class="bi bi-arrow-down-up"></i></button></th>
              <th scope="col">Description</th>
              <th scope="col">Max Level</th>
              <th scope="col">Applicable to</th>
              <th scope="col">Incompatibilities</th>
              <th scope="col">Loot Sources</th>
              <th scope="col">Data Pack</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
