<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="NiceRon">
  <title>Explorer's Eden: Enchantments</title>
  <meta name="description" content="Explorer's Eden enchantment reference for Java Minecraft datapacks.">
  <link rel="shortcut icon" href="assets/images/icons/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="assets/images/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="site-bg" aria-hidden="true"></div>
  <div class="starfield" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

  <header class="navbar">
    <a class="brand" href="#page-top" aria-label="Explorer's Eden enchantments home">
      <img src="assets/images/branding/ee_title_default.png" alt="Explorer's Eden">
    </a>
    <div class="header-tools" role="search">
      <div class="search-wrap">
        <label class="sr-only" for="search-input">Search enchantments</label>
        <i class="bi bi-search" aria-hidden="true"></i>
        <input type="search" id="search-input" placeholder="Search enchantments...">
        <button id="clear-search" type="button" aria-label="Clear search">×</button>
      </div>
      <div class="quick-filters" id="quick-filters" aria-label="Quick enchantment filters"></div>
      <p id="results-count" class="results-count" aria-live="polite"></p>
    </div>
    <details class="nav-menu">
      <summary><i class="bi bi-grid-3x3-gap-fill"></i><span>Links</span></summary>
      <nav class="nav-menu__panel" aria-label="Explorer's Eden links">
        <a target="_blank" rel="noreferrer" href="https://explorerseden.eu"><i class="bi bi-dpad-fill"></i> Homepage</a>
        <a target="_blank" rel="noreferrer" href="https://wiki.explorerseden.eu"><i class="bi bi-journal-bookmark-fill"></i> Wiki</a>
        <a target="_blank" rel="noreferrer" href="https://discord.gg/stAF7S8mrq"><i class="bi bi-discord"></i> Discord</a>
        <a target="_blank" rel="noreferrer" href="https://modrinth.com/organization/explorers-eden"><i class="bi bi-gear-fill"></i> Modrinth</a>
        <a target="_blank" rel="noreferrer" href="https://github.com/Explorers-Eden"><i class="bi bi-github"></i> GitHub</a>
      </nav>
    </details>
  </header>

  <main id="page-top" class="page-shell">
    <section class="hero">
      <img class="hero__title" src="./assets/images/enchantments_title.png" alt="Explorer's Eden Enchantments">
    </section>
    <section class="table-card" aria-label="Enchantments table">
      <div class="table-scroll">
        <table class="enchantments-table" id="data-table">
          <thead>
            <tr>
              <th scope="col"><button class="sort-button" type="button" data-sort="name">Name <i class="bi bi-arrow-down-up"></i></button></th>
              <th scope="col">Description</th>
              <th scope="col">Max Level</th>
              <th scope="col">Applicable to</th>
              <th scope="col">Incompatibilities</th>
              <th scope="col">Loot Sources</th>
              <th scope="col">Data Pack</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <footer class="site-footer">Explorer's Eden is in no way affiliated with Minecraft, Mojang AB and/or Notch Development AB.</footer>
  <script src="./js/app.js"></script>
</body>
</html>
